apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dpe
nameSuffix: -prod
namePrefix: dpe-
commonLabels:
  application: devopsproject-ecommerce
configurations:
- configurations/namereference.yml
resources:
- infrastructure/namespace.yml
- infrastructure/config-map.yml
- infrastructure/service-account.yml
- infrastructure/secrets/ecr-image-pull-credentials.yml
- infrastructure/secrets/kestrel-certificate.yml
- infrastructure/secrets/mongo-certificate.yml
- infrastructure/ingress.yml
- infrastructure/network-policies/ingress.yml
- infrastructure/network-policies/egress.yml
- infrastructure/analysis-template.yml

helmGlobals:
  chartHome: application

helmCharts:
- name: identity-server
  releaseName: identity-server
  repo: identity-server
  valuesFile: application/identity-server/values.yaml
- name: main
  releaseName: main
  repo: main
  valuesFile: application/main/values.yaml
- name: order
  releaseName: order
  repo: order
  valuesFile: application/order/values.yaml
- name: health-checker
  releaseName: health-checker
  repo: health-checker
  valuesFile: application/health-checker/values.yaml
- name: invoice-generator
  releaseName: invoice-generator
  repo: invoice-generator
  valuesFile: application/invoice-generator/values.yaml
- name: notificator
  releaseName: notificator
  repo: notificator
  valuesFile: application/notificator/values.yaml


images:
- name: 794038226274.dkr.ecr.us-east-1.amazonaws.com/devopsproject/prod/health-checker
  newName: 794038226274.dkr.ecr.us-east-1.amazonaws.com/devopsproject/prod/health-checker
  newTag: latest
- name: 794038226274.dkr.ecr.us-east-1.amazonaws.com/devopsproject/prod/identity-server
  newName: 794038226274.dkr.ecr.us-east-1.amazonaws.com/devopsproject/prod/identity-server
  newTag: latest
- name: 794038226274.dkr.ecr.us-east-1.amazonaws.com/devopsproject/prod/invoice-generator
  newName: 794038226274.dkr.ecr.us-east-1.amazonaws.com/devopsproject/prod/invoice-generator
  newTag: latest
- name: 794038226274.dkr.ecr.us-east-1.amazonaws.com/devopsproject/prod/main
  newName: 794038226274.dkr.ecr.us-east-1.amazonaws.com/devopsproject/prod/main
  newTag: latest
- name: 794038226274.dkr.ecr.us-east-1.amazonaws.com/devopsproject/prod/notificator
  newName: 794038226274.dkr.ecr.us-east-1.amazonaws.com/devopsproject/prod/notificator
  newTag: latest
- name: 794038226274.dkr.ecr.us-east-1.amazonaws.com/devopsproject/prod/order
  newName: 794038226274.dkr.ecr.us-east-1.amazonaws.com/devopsproject/prod/order
  newTag: latest
