apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  annotations:
    alb.ingress.kubernetes.io/backend-protocol: HTTPS
    # Preencher apos: terraform -chdir=devopsproject-ecommerce-iac/terraform/server output acm_certificate_arn
    alb.ingress.kubernetes.io/certificate-arn: <TERRAFORM_OUTPUT:acm_certificate_arn>
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTPS
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/load-balancer-name: dpe-ingress-prod
    alb.ingress.kubernetes.io/scheme: internal
    external-dns.alpha.kubernetes.io/hostname: backend.ecommerce.devopsproject.com.br
    alb.ingress.kubernetes.io/security-groups: devopsproject-production-alb-security-group,devopsproject-production-worker-security-group
    alb.ingress.kubernetes.io/conditions.dpe-main-preview-prod: '[{"field":"http-header","httpHeaderConfig":{"httpHeaderName":"x-preview","values":["true"]}}]'
    alb.ingress.kubernetes.io/conditions.dpe-order-preview-prod: '[{"field":"http-header","httpHeaderConfig":{"httpHeaderName":"x-preview","values":["true"]}}]'
    alb.ingress.kubernetes.io/conditions.dpe-identity-server-preview-prod: '[{"field":"http-header","httpHeaderConfig":{"httpHeaderName":"x-preview","values":["true"]}}]'
spec:
  ingressClassName: alb
  rules:
  - http:
      paths:
      # Preview routes (header: x-preview: true) — must come BEFORE active routes
      - path: /main
        pathType: Prefix
        backend:
          service:
            name: dpe-main-preview-prod
            port:
              number: 4443
      - path: /order
        pathType: Prefix
        backend:
          service:
            name: dpe-order-preview-prod
            port:
              number: 4443
      - path: /identity
        pathType: Prefix
        backend:
          service:
            name: dpe-identity-server-preview-prod
            port:
              number: 4443
      # Active routes (production traffic)
      - path: /healthchecks
        pathType: Prefix
        backend:
          service:
            name: dpe-health-checker-prod
            port:
              number: 4443
      - path: /identity
        pathType: Prefix
        backend:
          service:
            name: dpe-identity-server-prod
            port:
              number: 4443
      - path: /invoice
        pathType: Prefix
        backend:
          service:
            name: dpe-invoice-generator-prod
            port:
              number: 4443
      - path: /main
        pathType: Prefix
        backend:
          service:
            name: dpe-main-prod
            port:
              number: 4443
      - path: /notificator
        pathType: Prefix
        backend:
          service:
            name: dpe-notificator-prod
            port:
              number: 4443
      - path: /order
        pathType: Prefix
        backend:
          service:
            name: dpe-order-prod
            port:
              number: 4443
