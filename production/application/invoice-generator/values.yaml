invoiceGeneratorDeployment:
  image: 794038226274.dkr.ecr.us-east-1.amazonaws.com/devopsproject/prod/invoice-generator
  containerPort: 4443
  nodePort: 30003
  configMap: dpe-config-map-prod
  replicaCount: 1
  serviceAccount: dpe-sa-prod
  imagePullSecrets: dpe-ecr-image-pull-credentials-prod
  autoScaling:
    minReplicas: 1
    maxReplicas: 3
    averageCpuUtilization: 50
    # ADR-0007 — KEDA ScaledObject parameters (replaces hpa.yml)
    keda:
      # pollingInterval: how often KEDA polls SQS for ApproximateNumberOfMessages (seconds)
      pollingInterval: 30
      # cooldownPeriod: time to wait after last active trigger before scaling to minReplicas (seconds)
      cooldownPeriod: 120
      # queueLength: target messages per replica (scale-out trigger)
      queueLength: "10"
      # activationQueueLength: minimum queue depth to activate the ScaledObject
      activationQueueLength: "0"
    scaleDown:
      stabilizationWindowSeconds: 15
      policies:
      - type: Pods
        value: 2
        periodSeconds: 15
      - type: Percent
        value: 50
        periodSeconds: 15
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max
  topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
  volumes:
  - name: kestrel
    secret:
      secretName: dpe-kestrel-certificate-prod
  volumeMounts: 
  - name: kestrel
    readOnly: true
    mountPath: /dpe-backend/certificates/kestrel
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  livenessProbe:
    httpGet:
      path: /invoice/health
      port: 4443
      scheme: HTTPS
    successThreshold: 1
    failureThreshold: 3
    initialDelaySeconds: 120
    timeoutSeconds: 15
    periodSeconds: 60
  readinessProbe:
    httpGet:
      path: /invoice/health
      port: 4443
      scheme: HTTPS
    successThreshold: 1
    failureThreshold: 3
    initialDelaySeconds: 3
    timeoutSeconds: 15
    periodSeconds: 3