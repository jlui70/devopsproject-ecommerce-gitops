apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devopsproject-ecommerce
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jlui70/devopsproject-ecommerce-gitops
    targetRevision: HEAD
    path: production
  destination:
    server: https://kubernetes.default.svc
    namespace: dpe
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
